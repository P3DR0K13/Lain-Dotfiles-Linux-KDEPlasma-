<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  video#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 0.6; /* ajusta a intensidade */
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: #fff;
    font-family: monospace;
  }
</style>
</head>
<body>
  <video id="bg" autoplay muted loop playsinline>
    <source src="/home/p3drok13/Vídeos/LAIN2.mp4" type="video/mp4">
  </video>

  <div class="content">
    <!-- coloca widgets aqui se quiser: relógio, busca, etc -->
  </div>
</body>
</html>
